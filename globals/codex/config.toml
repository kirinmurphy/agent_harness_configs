model = "gpt-5.5"
model_reasoning_effort = "medium"
# BEGIN GENERATED AGENT PERMISSIONS
# Source: manifests/inventory/agent-permissions.json profile interactive
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = false
# END GENERATED AGENT PERMISSIONS

[notice.model_migrations]
"gpt-5.2-codex" = "gpt-5.3-codex"
"gpt-5.3-codex" = "gpt-5.4"

[plugins."github@openai-curated"]
enabled = true

[plugins."caveman@caveman-repo"]
enabled = true

[features]
js_repl = true
prevent_idle_sleep = true
hooks = true

[mcp_servers.jcodemunch]
command = "uvx"
args = ["jcodemunch-mcp"]

[mcp_servers.jdocmunch]
command = "uvx"
args = ["jdocmunch-mcp"]

[mcp_servers.jdocmunch.tools.index_local]
approval_mode = "approve"

[mcp_servers.jdocmunch.tools.index_repo]
approval_mode = "approve"

[mcp_servers.jdocmunch.tools.delete_index]
approval_mode = "approve"

[mcp_servers.jdocmunch.tools.list_repos]
approval_mode = "auto"

[mcp_servers.jdocmunch.tools.get_toc]
approval_mode = "approve"

[mcp_servers.jdocmunch.tools.get_toc_tree]
approval_mode = "auto"

[mcp_servers.jdocmunch.tools.get_document_outline]
approval_mode = "auto"

[mcp_servers.jdocmunch.tools.search_sections]
approval_mode = "approve"

[mcp_servers.jdocmunch.tools.get_section]
approval_mode = "approve"

[mcp_servers.jdocmunch.tools.get_sections]
approval_mode = "approve"

[mcp_servers.jdocmunch.tools.get_section_context]
approval_mode = "approve"

[mcp_servers.jdocmunch.tools.get_broken_links]
approval_mode = "auto"

[mcp_servers.jdocmunch.tools.get_doc_coverage]
approval_mode = "auto"

[mcp_servers.jdocmunch.tools.doc_list_repos]
approval_mode = "approve"

[mcp_servers.jdocmunch.tools.list_repo_groups]
approval_mode = "approve"

[mcp_servers.jdocmunch.tools.list_docs]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.resolve_repo]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.search_text]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.get_file_outline]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.get_file_content]
approval_mode = "auto"

[mcp_servers.jcodemunch.tools.find_references]
approval_mode = "auto"

[mcp_servers.jcodemunch.tools.index_file]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.register_edit]
approval_mode = "auto"

[mcp_servers.jcodemunch.tools.search_symbols]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.get_context_bundle]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.get_symbol_source]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.get_repo_outline]
approval_mode = "auto"

[mcp_servers.jcodemunch.tools.get_file_tree]
approval_mode = "auto"

[mcp_servers.jcodemunch.tools.index_folder]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.plan_turn]
approval_mode = "auto"

[mcp_servers.jcodemunch.tools.get_ranked_context]
approval_mode = "approve"

[mcp_servers.jcodemunch.tools.list_repos]
approval_mode = "approve"

[tui.model_availability_nux]
"gpt-5.5" = 4
